<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前沿技术情报检索 Agent</title>
    <!-- 使用 Google Font 提升字体质感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <div class="hero-content">
                <div class="logo-badge">🚀 AI 前沿追踪</div>
                <h1>技术情报检索 Agent</h1>
                <p class="subtitle">实时追踪 arXiv · GitHub · Hugging Face 多模态大模型最新动态</p >
                <button id="fetchBtn" class="btn-primary">
                    <span class="btn-icon">📡</span> 获取最新趋势
                </button>
            </div>
            <div class="hero-glow"></div>
        </header>

        <!-- 加载状态 -->
        <div id="loading" class="loading-state" style="display:none;">
            <div class="spinner"></div>
            <p>正在从全球开源社区抓取数据...</p >
        </div>

        <!-- 趋势列表 -->
        <section id="trendsSection" class="card-section" style="display:none;">
            <div class="section-header">
                <h2>📊 最新技术动态</h2>
                <span class="badge" id="trendCount">0 条</span>
            </div>
            <div id="trendsList" class="trends-grid"></div>
        </section>
        <div id="generated-image" style="margin: 20px 0; text-align: center;"></div>
        <!-- 提示词参数 -->
        <section id="promptSection" class="card-section" style="display:none;">
            <div class="section-header">
                <h2>🎨 自动生成的提示词参数</h2>
                <span class="badge">适配「用图说AI」API</span>
            </div>
            <div id="promptParams" class="params-card"></div>
        </section>

        <footer class="footer">
            <p>⚡ 由 Agent 自动构建 · 数据实时更新</p >
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
